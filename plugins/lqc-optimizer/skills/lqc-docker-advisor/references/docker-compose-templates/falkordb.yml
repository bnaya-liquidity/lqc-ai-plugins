services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: CONTAINER_NAME
    ports:
      - "HOST_PORT:6379"
    volumes:
      - VOLUME_NAME:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  VOLUME_NAME:
