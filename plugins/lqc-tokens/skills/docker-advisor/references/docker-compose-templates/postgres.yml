services:
  postgres:
    image: postgres:16-alpine
    container_name: CONTAINER_NAME
    ports:
      - "HOST_PORT:5432"
    volumes:
      - VOLUME_NAME:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: lqcdata
      POSTGRES_USER: lqc
      POSTGRES_PASSWORD: lqcpass
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lqc -d lqcdata"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  VOLUME_NAME:
